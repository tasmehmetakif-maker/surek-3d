<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sürek Şelalesi — 3B</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0e1116; color:#e8edf2; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; }
  #tabs { position:fixed; top:0; left:0; right:0; height:46px; display:flex; gap:4px; align-items:center; padding:0 10px; background:rgba(16,20,26,.95); border-bottom:1px solid rgba(255,255,255,.08); z-index:20; }
  #tabs strong { font-size:14px; margin-right:14px; }
  .tab { background:transparent; color:#9aa3af; border:0; padding:8px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .tab:hover { color:#fff; background:rgba(255,255,255,.06); }
  .tab.active { color:#fff; background:#2f6df0; }
  .view { position:fixed; top:46px; left:0; right:0; bottom:0; display:none; }
  .view.active { display:block; }
  canvas { display:block; }
  #quality { position:absolute; top:10px; right:14px; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; max-width:60vw; z-index:10; }
  #quality button { background:rgba(30,35,44,.82); color:#cdd5df; border:1px solid rgba(255,255,255,.12); padding:7px 12px; border-radius:9px; font-size:13px; cursor:pointer; backdrop-filter:blur(6px); }
  #quality button:hover { background:rgba(54,62,76,.95); color:#fff; }
  #quality button.active { background:#2f6df0; color:#fff; border-color:#2f6df0; }
  #quality button.ultra.active { background:#b3471d; border-color:#b3471d; }
  .hud { position:absolute; top:10px; left:14px; font-size:12px; opacity:.8; text-shadow:0 1px 4px rgba(0,0,0,.6); z-index:10; }
  .status { position:absolute; left:14px; bottom:40px; font-size:13px; background:rgba(20,24,30,.85); padding:7px 11px; border-radius:8px; z-index:10; max-width:80vw; }
  .osd { width:100%; height:100%; background:#0e1116; }
  #warn { position:fixed; left:0; right:0; bottom:0; text-align:center; color:#f0d9a8; font-size:12px; background:rgba(40,30,12,.92); padding:6px 14px; z-index:30; }
  .hint { position:absolute; right:14px; bottom:40px; font-size:12px; color:#9aa3af; background:rgba(20,24,30,.7); padding:5px 11px; border-radius:14px; z-index:10; }
</style>
</head>
<body>
  <div id="tabs">
    <strong>Sürek Şelalesi</strong>
    <button class="tab active" data-view="model">3B Model</button>
    <button class="tab" data-view="ortho">Ortofoto</button>
    <button class="tab" data-view="dem2d">DEM (2B)</button>
  </div>

  <!-- 3B MODEL -->
  <div class="view active" id="view-model">
    <div class="hud" id="model-stats"></div>
    <div id="quality">
      <button class="q" data-url="low.glb">Düşük</button>
      <button class="q active" data-url="medium.glb">Orta</button>
      <button class="q" data-url="high.glb">Yüksek</button>
      <button class="q ultra" data-url="ultra.glb">En Yüksek ⚡</button>
    </div>
    <div class="status" id="model-status">Durum: başlatılıyor…</div>
    <div class="hint">Sürükle: döndür · Sağ tık: kaydır · Tekerlek: yakınlaş</div>
  </div>

  <!-- ORTOFOTO -->
  <div class="view" id="view-ortho"><div class="osd" id="osd-ortho"></div></div>

  <!-- DEM 2B -->
  <div class="view" id="view-dem2d"><div class="osd" id="osd-dem"></div></div>

  <div id="warn">⚠️ "Yüksek" ve "En Yüksek" güçlü bir bilgisayar ister. Model açılmazsa veya takılırsa daha düşük bir kalite seçin.</div>

  <script type="importmap">
  { "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }}
  </script>
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  let activeRender = null;

  const views = {};
  function registerView(name, onFirstShow) { views[name] = { init:false, onFirstShow }; }
  function showView(name) {
    document.getElementById('warn').style.display = (name === 'model') ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
    document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
    const v = views[name];
    if (v && !v.init) { v.init = true; try { v.onFirstShow(); } catch(e){ console.error(e); } }
    if (v && v.onActivate) v.onActivate();
  }
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => showView(t.dataset.view));

  (function loop(){ requestAnimationFrame(loop); if (activeRender) activeRender(); })();

  // ===================== 3B MODEL =====================
  registerView('model', () => {});
  {
    const host = document.getElementById('view-model');
    const statusEl = document.getElementById('model-status');
    const setStatus = (t, ok) => { statusEl.textContent = 'Durum: ' + t; statusEl.style.background = ok===true?'rgba(22,54,31,.92)':ok===false?'rgba(70,26,26,.95)':'rgba(20,24,30,.85)'; };

    const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NeutralToneMapping ?? THREE.NoToneMapping;
    host.appendChild(renderer.domElement);
    renderer.domElement.addEventListener('webglcontextlost', (e) => { e.preventDefault(); setStatus('✗ Cihaz bu kaliteyi kaldıramadı — daha DÜŞÜK kalite seçin', false); });

    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0e1116);
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100000);
    scene.add(new THREE.HemisphereLight(0xffffff,0x3a3f4a,1.2));
    scene.add(new THREE.AmbientLight(0xffffff,0.35));
    const sun = new THREE.DirectionalLight(0xffffff,1.3); sun.position.set(1,2,1.5); scene.add(sun);
    const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;

    const draco = new DRACOLoader(); draco.setDecoderPath('https://unpkg.com/three@0.169.0/examples/jsm/libs/draco/');
    const loader = new GLTFLoader(); loader.setDRACOLoader(draco);
    let current = null;
    const dispose = o => o.traverse(n => { if (n.isMesh){ n.geometry?.dispose(); (Array.isArray(n.material)?n.material:[n.material]).forEach(m=>m?.dispose()); } });
    function frame(obj){ const b=new THREE.Box3().setFromObject(obj), s=b.getSize(new THREE.Vector3()), c=b.getCenter(new THREE.Vector3()); obj.position.sub(c); const d=Math.max(s.x,s.y,s.z)||1, dist=(d/2)/Math.tan(camera.fov*Math.PI/360)*1.6; camera.position.copy(new THREE.Vector3(1,.75,1).normalize().multiplyScalar(dist)); camera.near=dist/100; camera.far=dist*100; camera.updateProjectionMatrix(); controls.target.set(0,0,0); controls.minDistance=d*.02; controls.maxDistance=d*8; controls.update(); }
    function stats(obj){ let t=0; obj.traverse(o=>{ if(o.isMesh&&o.geometry){ const g=o.geometry; t+=g.index?g.index.count/3:g.attributes.position.count/3; } }); document.getElementById('model-stats').textContent = Math.round(t).toLocaleString('tr-TR')+' üçgen'; }
    function load(url, btn){ setStatus('yükleniyor… ('+url+')'); loader.load(url+'?t='+Date.now(),
      g=>{ if(current){scene.remove(current);dispose(current);} current=g.scene; scene.add(current); frame(current); stats(current); setStatus('✓ '+url+' yüklendi', true); document.querySelectorAll('.q').forEach(b=>b.classList.remove('active')); btn?.classList.add('active'); },
      x=>{ if(x.total) setStatus('yükleniyor… %'+Math.round(x.loaded/x.total*100)); },
      e=>{ console.error(e); setStatus('✗ "'+url+'" açılamadı — daha DÜŞÜK kalite seçin', false); }); }
    document.querySelectorAll('.q').forEach(b => b.onclick = () => load(b.dataset.url, b));

    function resize(){ const w=host.clientWidth, h=host.clientHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
    addEventListener('resize', resize);
    views.model.onActivate = () => { resize(); activeRender = () => { controls.update(); renderer.render(scene,camera); }; };
    resize();
    views.model.onActivate();
    load('medium.glb', document.querySelector('.q.active'));
  }

  // ===================== ORTOFOTO =====================
  registerView('ortho', () => {
    OpenSeadragon({ element: document.getElementById('osd-ortho'), tileSources:{ type:'image', url:'ortho.jpg' }, showNavigationControl:false, gestureSettingsMouse:{clickToZoom:false} });
  });
  views.ortho && (views.ortho.onActivate = () => { activeRender = null; });

  // ===================== DEM 2B =====================
  registerView('dem2d', () => {
    OpenSeadragon({ element: document.getElementById('osd-dem'), tileSources:{ type:'image', url:'dem_relief.jpg' }, showNavigationControl:false, gestureSettingsMouse:{clickToZoom:false} });
  });
  views.dem2d && (views.dem2d.onActivate = () => { activeRender = null; });
  </script>
</body>
</html>
