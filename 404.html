<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, follow" />
<title>Sayfa bulunamadı (404) — Mehmet Akif Taş</title>
<style>
  :root { color-scheme: dark; --accent:#2f6df0; --bg:#0d1014; --card:#161b22; --line:rgba(255,255,255,.08); --muted:#9aa3af; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
         background:radial-gradient(1200px 600px at 50% -10%, #1a2230 0%, var(--bg) 60%); color:#e8edf2;
         font-family:system-ui,-apple-system,"Segoe UI",sans-serif; line-height:1.6; text-align:center; }
  .wrap { max-width:560px; }
  .code { font-size:clamp(72px,18vw,140px); font-weight:800; letter-spacing:-.04em;
          background:linear-gradient(180deg,#fff,#7f93b5); -webkit-background-clip:text; background-clip:text; color:transparent; }
  h1 { font-size:clamp(20px,4vw,28px); margin:.2em 0 .4em; }
  p { color:var(--muted); margin-bottom:1.6em; }
  .links { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  a.btn { display:inline-block; padding:11px 20px; border-radius:10px; text-decoration:none; font-weight:600; font-size:15px;
          border:1px solid var(--line); color:#e8edf2; background:var(--card); transition:transform .12s ease, border-color .12s ease; }
  a.btn:hover { transform:translateY(-2px); border-color:var(--accent); }
  a.btn.primary { background:var(--accent); border-color:var(--accent); }
  .lang { margin-top:22px; font-size:13px; color:var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Bu sayfa bulunamadı</h1>
    <p>Aradığınız sayfa taşınmış veya hiç var olmamış olabilir. Aşağıdan ana sayfaya dönebilirsiniz.</p>
    <div class="links">
      <a class="btn primary" href="/">Akademik Portföy</a>
      <a class="btn" href="/surek.html">Sürek Şelalesi 3B</a>
      <a class="btn" href="/yayinlar.html">Yayınlar</a>
    </div>
    <div class="lang">Page not found — use the links above to return to the homepage.</div>
  </div>
</body>
</html>
